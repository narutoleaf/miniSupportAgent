services:
  postgres:
    image: postgres:16-alpine
    container_name: store_agent_db
    environment:
      POSTGRES_DB: store_agent
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d store_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
