<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Support Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #334155;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: #94a3b8;
    }

    .new-chat-btn {
      margin: 16px 20px;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .new-chat-btn:hover { background: #2563eb; }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #94a3b8;
      transition: background 0.15s;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item:hover { background: #334155; color: #e2e8f0; }
    .conversation-item.active { background: #334155; color: #f1f5f9; }

    .conversation-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .conversation-item .conv-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversation-item .delete-btn {
      display: none;
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-left: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .conversation-item:hover .delete-btn { display: block; }
    .conversation-item .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    /* Controls */
    .sidebar-controls {
      padding: 16px 20px;
      border-top: 1px solid #334155;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #94a3b8;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #475569;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #ef4444; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-title {
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
    }

    .memory-btn {
      padding: 6px 12px;
      background: #334155;
      color: #94a3b8;
      border: 1px solid #475569;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .memory-btn:hover { background: #475569; color: #e2e8f0; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user { white-space: pre-wrap; }

    .message.user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .message.streaming {
      border-color: #3b82f6;
    }

    .message.assistant p { margin: 0 0 8px 0; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant ul, .message.assistant ol { margin: 4px 0 8px 20px; }
    .message.assistant li { margin: 2px 0; }
    .message.assistant strong { color: #f1f5f9; }
    .message.assistant code { background: #334155; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .message.assistant pre { background: #334155; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
    .message.assistant pre code { background: none; padding: 0; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #475569;
      gap: 12px;
    }

    .empty-state h2 { font-size: 20px; font-weight: 500; color: #64748b; }
    .empty-state p { font-size: 13px; }

    /* Tool call indicator */
    .tool-call {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: #94a3b8;
      animation: fadeSlideIn 0.3s ease;
    }

    .tool-call .tool-icon {
      width: 18px;
      height: 18px;
      background: #3b82f6;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
      flex-shrink: 0;
    }

    .tool-call .tool-icon.done { background: #22c55e; }

    .tool-call .tool-name {
      font-weight: 600;
      color: #3b82f6;
    }

    .tool-call .tool-args {
      color: #64748b;
      font-family: monospace;
      font-size: 11px;
    }

    .tool-call .tool-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #64748b;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Input */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #334155;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #3b82f6; }

    .send-btn {
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #2563eb; }
    .send-btn:disabled { background: #475569; cursor: not-allowed; }

    /* Memory panel */
    .memory-panel {
      display: none;
      position: absolute;
      right: 24px;
      top: 60px;
      width: 320px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      z-index: 10;
    }

    .memory-panel.open { display: block; }

    .memory-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f1f5f9;
    }

    .memory-fact {
      padding: 8px 0;
      border-bottom: 1px solid #334155;
      font-size: 13px;
    }

    .memory-fact:last-child { border-bottom: none; }

    .memory-fact .key {
      color: #3b82f6;
      font-weight: 500;
    }

    .memory-empty {
      color: #64748b;
      font-size: 13px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Store Support Agent</h1>
      <p>Retail management assistant</p>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Conversation</button>
    <div class="conversation-list" id="convList"></div>
    <div class="sidebar-controls">
      <div class="toggle-row">
        <span>Simulate tool failure</span>
        <label class="toggle">
          <input type="checkbox" id="failToggle" onchange="toggleFailure(this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <span class="chat-header-title" id="chatTitle">No conversation selected</span>
      <button class="memory-btn" onclick="toggleMemory()">Memory</button>
    </div>

    <div class="memory-panel" id="memoryPanel"></div>

    <div class="messages" id="messages">
      <div class="empty-state">
        <h2>Store Support Agent</h2>
        <p>Start a new conversation to chat with the agent</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input
          type="text"
          id="messageInput"
          placeholder="Type a message..."
          onkeydown="if(event.key==='Enter') sendMessage()"
          disabled
        />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>

<script>
  const API = '';
  let currentConvId = null;
  let conversations = [];
  let sending = false;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Load existing conversations from Postgres on page load
  async function loadConversations() {
    const res = await fetch(`${API}/api/conversations`);
    const rows = await res.json();
    conversations = rows.map(r => ({
      id: r.id,
      preview: r.preview
        ? (r.preview.length > 35 ? r.preview.slice(0, 35) + '...' : r.preview)
        : 'Empty conversation'
    }));
    renderConvList();
  }

  async function newChat() {
    const res = await fetch(`${API}/api/conversations`, { method: 'POST' });
    const { id } = await res.json();
    conversations.unshift({ id, preview: 'New conversation' });
    currentConvId = id;
    renderConvList();
    clearMessages();
    enableInput();
    document.getElementById('chatTitle').textContent = id.slice(0, 8) + '...';
  }

  function renderConvList() {
    const el = document.getElementById('convList');
    el.innerHTML = conversations.map(c =>
      `<div class="conversation-item ${c.id === currentConvId ? 'active' : ''}"
            onclick="selectConv('${escapeHtml(c.id)}')">
        <span class="conv-text">${escapeHtml(c.preview)}</span>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteConv('${escapeHtml(c.id)}')" title="Delete conversation">&times;</button>
      </div>`
    ).join('');
  }

  async function deleteConv(id) {
    if (!confirm('Delete this conversation?')) return;
    await fetch(`${API}/api/conversations/${id}`, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== id);
    if (currentConvId === id) {
      currentConvId = null;
      document.getElementById('chatTitle').textContent = 'No conversation selected';
      document.getElementById('messages').innerHTML = `
        <div class="empty-state">
          <h2>Store Support Agent</h2>
          <p>Start a new conversation to chat with the agent</p>
        </div>`;
      document.getElementById('messageInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
    }
    renderConvList();
  }

  async function selectConv(id) {
    currentConvId = id;
    renderConvList();
    enableInput();
    document.getElementById('chatTitle').textContent = id.slice(0, 8) + '...';

    const res = await fetch(`${API}/api/conversations/${id}/messages`);
    const msgs = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    for (const m of msgs) {
      if (m.role === 'tool') continue;
      appendMessage(m.role, m.content);
    }
    container.scrollTop = container.scrollHeight;
  }

  function clearMessages() {
    document.getElementById('messages').innerHTML = '';
  }

  function enableInput() {
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messageInput').focus();
  }

  function renderMarkdown(text) {
    const raw = marked.parse(text, { breaks: true });
    return DOMPurify.sanitize(raw);
  }

  function appendMessage(role, content) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'assistant' && content) {
      div.innerHTML = renderMarkdown(content);
    } else {
      div.textContent = content;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  const TOOL_LABELS = {
    lookupOrderStatus: 'Looking up order',
    checkInventory: 'Checking inventory',
    getStoreInfo: 'Fetching store info',
    escalateToHuman: 'Escalating to human agent',
  };

  function showTypingIndicator() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function hideTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function showToolCall(toolName, args) {
    hideTypingIndicator();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'tool-call';
    div.id = `tool-${toolName}-${Date.now()}`;
    div.dataset.toolName = toolName;

    const label = TOOL_LABELS[toolName] || escapeHtml(toolName);
    const argStr = Object.entries(args).map(([k, v]) => `${escapeHtml(String(k))}: ${escapeHtml(String(v))}`).join(', ');

    div.innerHTML = `
      <div class="tool-icon"><span>&#9881;</span></div>
      <span class="tool-name">${escapeHtml(label)}</span>
      <span class="tool-args">(${argStr})</span>
      <div class="tool-spinner"></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function completeToolCall(toolName) {
    const els = document.querySelectorAll(`.tool-call[data-tool-name="${toolName}"]`);
    const el = els[els.length - 1];
    if (!el) return;
    const spinner = el.querySelector('.tool-spinner');
    if (spinner) spinner.remove();
    const icon = el.querySelector('.tool-icon');
    if (icon) { icon.classList.add('done'); icon.innerHTML = '<span>&#10003;</span>'; }
  }

  async function sendMessage() {
    if (sending || !currentConvId) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    sending = true;
    input.value = '';
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);

    // Update conversation preview in sidebar
    const conv = conversations.find(c => c.id === currentConvId);
    if (conv && conv.preview === 'New conversation') {
      conv.preview = text.length > 35 ? text.slice(0, 35) + '...' : text;
      renderConvList();
    }

    // Show typing indicator while waiting
    showTypingIndicator();

    let assistantDiv = null;
    let rawText = '';

    try {
      const res = await fetch(`${API}/api/conversations/${currentConvId}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = JSON.parse(line.slice(6));
          if (data.type === 'tool-call') {
            showToolCall(data.toolName, data.args);
          } else if (data.type === 'tool-result') {
            completeToolCall(data.toolName);
          } else if (data.type === 'chunk') {
            if (!assistantDiv) {
              hideTypingIndicator();
              assistantDiv = appendMessage('assistant', '');
              assistantDiv.classList.add('streaming');
            }
            rawText += data.content;
            assistantDiv.innerHTML = renderMarkdown(rawText);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
          } else if (data.type === 'error') {
            hideTypingIndicator();
            if (!assistantDiv) {
              assistantDiv = appendMessage('assistant', '');
            }
            rawText += `\n[Error: ${data.content}]`;
            assistantDiv.innerHTML = renderMarkdown(rawText);
          }
        }
      }
    } catch (err) {
      hideTypingIndicator();
      if (!assistantDiv) {
        assistantDiv = appendMessage('assistant', '');
      }
      assistantDiv.textContent = `Error: ${err.message}`;
    }

    hideTypingIndicator();
    if (assistantDiv) assistantDiv.classList.remove('streaming');
    sending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  async function toggleFailure(enabled) {
    await fetch(`${API}/api/simulate-failure`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled }),
    });
  }

  async function toggleMemory() {
    const panel = document.getElementById('memoryPanel');
    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      return;
    }

    if (!currentConvId) {
      panel.innerHTML = '<h3>Memory</h3><p class="memory-empty">No conversation selected</p>';
      panel.classList.add('open');
      return;
    }

    const res = await fetch(`${API}/api/conversations/${currentConvId}/memory`);
    const facts = await res.json();

    if (facts.length === 0) {
      panel.innerHTML = '<h3>Memory</h3><p class="memory-empty">No facts stored yet</p>';
    } else {
      panel.innerHTML = '<h3>Memory</h3>' + facts.map(f =>
        `<div class="memory-fact"><span class="key">${escapeHtml(f.key)}</span>: ${escapeHtml(f.value)}</div>`
      ).join('');
    }

    panel.classList.add('open');
  }

  // Close memory panel when clicking outside
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('memoryPanel');
    const btn = document.querySelector('.memory-btn');
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
    }
  });

  // Init: load conversations from DB
  loadConversations();
</script>

</body>
</html>
